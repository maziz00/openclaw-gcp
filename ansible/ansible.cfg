[defaults]
inventory = ./inventory/gcp.yml
roles_path = ./roles
remote_tmp = /tmp/.ansible/tmp
forks = 5
timeout = 30
host_key_checking = False
stdout_callback = yaml
callbacks_enabled = timer, profile_tasks
allow_world_readable_tmpfiles = True

[ssh_connection]
pipelining = True
# All SSH connections go through Google IAP tunnel — the VM has no public IP.
# %h is the instance name (ansible_host from inventory).
# GCP_PROJECT_ID and GCP_ZONE must be exported before running ansible-playbook.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -i ~/.ssh/google_compute_engine -o ProxyCommand="gcloud compute start-iap-tunnel %h 22 --listen-on-stdin --project=claude-code-00 --zone=us-central1-a"

[privilege_escalation]
become = True
become_method = sudo
become_user = root
