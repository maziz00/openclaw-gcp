[defaults]
inventory = ./inventory/gcp.yml
roles_path = ./roles
remote_tmp = /tmp/.ansible/tmp
forks = 5
timeout = 30
host_key_checking = False
stdout_callback = yaml
callbacks_enabled = timer, profile_tasks

[ssh_connection]
pipelining = True
# All SSH connections go through Google IAP tunnel — the VM has no public IP.
# %h is the instance name (ansible_host from inventory).
# GCP_PROJECT_ID and GCP_ZONE must be exported before running ansible-playbook.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o ProxyCommand="gcloud compute start-iap-tunnel %h 22 --listen-on-stdin --project=${GCP_PROJECT_ID} --zone=${GCP_ZONE}"

[privilege_escalation]
become = True
become_method = sudo
become_user = root
