---
plugin: google.cloud.gcp_compute
projects:
  - "{{ lookup('ansible.builtin.env', 'GCP_PROJECT_ID') }}"
auth_kind: application
filters:
  - labels.app = openclaw
  - labels.environment = production
  - status = RUNNING
keyed_groups:
  - key: zone
    prefix: zone
hostnames:
  - name   # use instance name, not public IP (instance has no public IP)
compose:
  ansible_host: name   # gcloud compute start-iap-tunnel uses instance name
