---
- name: Create secrets directory
  ansible.builtin.file:
    path: "{{ secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Fetch Anthropic API key from GCP Secret Manager
  ansible.builtin.shell:
    cmd: >
      gcloud secrets versions access latest
      --secret="{{ gcp_secret_prefix }}-anthropic-api-key"
      --project="{{ gcp_project_id }}"
  register: anthropic_api_key
  changed_when: false
  no_log: true
  when: claude_provider == "anthropic_api"

- name: Write Anthropic API key to secrets file
  ansible.builtin.copy:
    content: "{{ anthropic_api_key.stdout }}"
    dest: "{{ secrets_dir }}/anthropic_api_key"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: claude_provider == "anthropic_api"

# Vertex AI authentication uses the VM's attached service account via ADC.
# The compute SA has roles/aiplatform.user — no credentials file is needed.

- name: Fetch Telegram bot token from GCP Secret Manager
  ansible.builtin.shell:
    cmd: >
      gcloud secrets versions access latest
      --secret="{{ telegram_secret_name }}"
      --project="{{ gcp_project_id }}"
  register: telegram_bot_token
  changed_when: false
  no_log: true
  when: openclaw_channels.telegram | default(false)

- name: Write Telegram bot token to secrets file
  ansible.builtin.copy:
    content: "{{ telegram_bot_token.stdout }}"
    dest: "{{ secrets_dir }}/telegram_bot_token"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: openclaw_channels.telegram | default(false)

- name: Fetch Discord bot token from GCP Secret Manager
  ansible.builtin.shell:
    cmd: >
      gcloud secrets versions access latest
      --secret="{{ discord_secret_name }}"
      --project="{{ gcp_project_id }}"
  register: discord_bot_token
  changed_when: false
  no_log: true
  when: openclaw_channels.discord | default(false)

- name: Write Discord bot token to secrets file
  ansible.builtin.copy:
    content: "{{ discord_bot_token.stdout }}"
    dest: "{{ secrets_dir }}/discord_bot_token"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: openclaw_channels.discord | default(false)
