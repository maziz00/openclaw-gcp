---
- name: Create secrets directory
  ansible.builtin.file:
    path: "{{ secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Fetch Anthropic API key from GCP Secret Manager
  ansible.builtin.shell:
    cmd: >
      gcloud secrets versions access latest
      --secret="{{ gcp_secret_prefix }}-anthropic-api-key"
      --project="{{ gcp_project_id }}"
  register: anthropic_api_key
  changed_when: false
  no_log: true

- name: Write Anthropic API key to secrets file
  ansible.builtin.copy:
    content: "{{ anthropic_api_key.stdout }}"
    dest: "{{ secrets_dir }}/anthropic_api_key"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Fetch Vertex AI credentials from GCP Secret Manager
  ansible.builtin.shell:
    cmd: >
      gcloud secrets versions access latest
      --secret="{{ gcp_secret_prefix }}-vertex-ai-credentials"
      --project="{{ gcp_project_id }}"
  register: vertex_ai_creds
  changed_when: false
  no_log: true
  when: claude_provider == "vertex_ai"

- name: Write Vertex AI credentials to secrets file
  ansible.builtin.copy:
    content: "{{ vertex_ai_creds.stdout }}"
    dest: "{{ secrets_dir }}/vertex_ai_credentials.json"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: claude_provider == "vertex_ai"
