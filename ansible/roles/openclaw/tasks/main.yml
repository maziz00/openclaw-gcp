---
- name: Read Telegram bot token from secrets file
  ansible.builtin.slurp:
    src: "{{ secrets_dir }}/telegram_bot_token"
  register: _telegram_token
  when: openclaw_channels.telegram | default(false)
  no_log: true

- name: Read Discord bot token from secrets file
  ansible.builtin.slurp:
    src: "{{ secrets_dir }}/discord_bot_token"
  register: _discord_token
  when: openclaw_channels.discord | default(false)
  no_log: true

- name: Read Anthropic API key from secrets file
  ansible.builtin.slurp:
    src: "{{ secrets_dir }}/anthropic_api_key"
  register: _anthropic_key
  when: claude_provider == "anthropic_api"
  no_log: true

- name: Create OpenClaw directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ openclaw_data_dir }}"
    - "{{ openclaw_config_dir }}"

- name: Create OpenClaw app config directory (owned by node user UID 1000)
  ansible.builtin.file:
    path: "{{ openclaw_data_dir }}/config"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ openclaw_config_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: restart openclaw

- name: Template OpenClaw environment file
  ansible.builtin.template:
    src: openclaw-env.j2
    dest: "{{ openclaw_config_dir }}/openclaw.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart openclaw

- name: Pull OpenClaw Docker image
  ansible.builtin.command:
    cmd: docker pull "{{ openclaw_image }}:{{ openclaw_version }}"
  changed_when: true

- name: Start OpenClaw with Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ openclaw_config_dir }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Creating' in compose_up.stderr"

- name: Wait for OpenClaw container to be running
  ansible.builtin.command:
    cmd: docker inspect -f '{{ "{{" }}.State.Running{{ "}}" }}' openclaw
  register: container_status
  until: container_status.stdout == "true"
  retries: 12
  delay: 10
  changed_when: false
