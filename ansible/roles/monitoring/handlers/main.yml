---
- name: restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    daemon_reload: true

- name: restart cost-tracker
  ansible.builtin.systemd:
    name: openclaw-cost-tracker
    state: restarted
    daemon_reload: true

- name: reload firewalld
  ansible.builtin.command:
    cmd: firewall-cmd --reload
